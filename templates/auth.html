<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TasteMate — {{ "Sign Up" if mode == "register" else "Login" }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
  <style>
    .auth-wrapper {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #fefcf7 0%, #fff5eb 100%);
    }
    .auth-card {
      background: white;
      border-radius: 20px;
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .auth-logo {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .auth-logo h1 {
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--primary);
      letter-spacing: -1px;
    }
    .auth-logo h1 span { font-weight: 300; color: var(--text); }
    .auth-logo p { color: var(--text-muted); font-size: 0.95rem; margin-top: 0.25rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group label {
      display: block;
      font-weight: 600;
      font-size: 0.88rem;
      margin-bottom: 0.35rem;
      color: var(--text);
    }
    .form-group input {
      width: 100%;
      padding: 0.7rem 1rem;
      border: 2px solid var(--border);
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus { border-color: var(--primary); }
    .auth-btn {
      width: 100%;
      padding: 0.8rem;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.2s;
    }
    .auth-btn:hover { background: var(--primary-dark); }
    .auth-switch {
      text-align: center;
      margin-top: 1.2rem;
      font-size: 0.9rem;
      color: var(--text-muted);
    }
    .auth-switch a { color: var(--primary); font-weight: 600; text-decoration: none; }
    .auth-switch a:hover { text-decoration: underline; }
    .auth-error {
      background: #fef2f2;
      color: #dc2626;
      padding: 0.6rem 1rem;
      border-radius: 8px;
      font-size: 0.88rem;
      margin-bottom: 1rem;
      display: none;
    }
  </style>
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-logo">
        <h1>Taste<span>Mate</span></h1>
        <p>Discover foods you'll love across the world</p>
      </div>

      <div id="auth-error" class="auth-error"></div>

      {% if mode == "register" %}
      <form id="register-form" onsubmit="return handleRegister(event)">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="reg-username" placeholder="Pick a username" required />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="reg-email" placeholder="your@email.com" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="reg-password" placeholder="At least 6 characters" required minlength="6" />
        </div>
        <button type="submit" class="auth-btn">Create Account</button>
      </form>
      <div class="auth-switch">
        Already have an account? <a href="/login">Log in</a>
      </div>

      {% else %}
      <form id="login-form" onsubmit="return handleLogin(event)">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="your@email.com" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="Your password" required />
        </div>
        <button type="submit" class="auth-btn">Log In</button>
      </form>
      <div class="auth-switch">
        Don't have an account? <a href="/register">Sign up</a>
      </div>
      {% endif %}
    </div>
  </div>

  <script>
    function showError(msg) {
      const el = document.getElementById("auth-error");
      el.textContent = msg;
      el.style.display = "block";
    }

    async function handleRegister(e) {
      e.preventDefault();
      const res = await fetch("/api/auth/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          username: document.getElementById("reg-username").value,
          email: document.getElementById("reg-email").value,
          password: document.getElementById("reg-password").value,
        }),
      });
      const data = await res.json();
      if (data.error) return showError(data.error);
      window.location.href = "/";
      return false;
    }

    async function handleLogin(e) {
      e.preventDefault();
      const res = await fetch("/api/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          email: document.getElementById("login-email").value,
          password: document.getElementById("login-password").value,
        }),
      });
      const data = await res.json();
      if (data.error) return showError(data.error);
      window.location.href = "/";
      return false;
    }
  </script>
</body>
</html>
